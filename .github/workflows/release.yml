name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/linghua-reader-${{ steps.version.outputs.VERSION }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 玲华阅读 v${{ steps.version.outputs.VERSION }}
          body: |
            ## 玲华阅读 v${{ steps.version.outputs.VERSION }}

            ### 下载安装
            下载下方 APK 文件安装即可。

            ---
            *自动构建于 ${{ github.sha }}*
          files: app/build/outputs/apk/release/linghua-reader-${{ steps.version.outputs.VERSION }}.apk
          draft: false
          prerelease: false
